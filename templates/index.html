<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
</head>
<body>
    <h1>My To-Do List</h1>

    <!-- Input Form -->
    <form action = "/add" method = "POST">
        <input type = "text" name = "task" placeholder="Enter a task" required>
        <button type = "submit">Add</button>
    </form>

    <ul>    
        {% for task in tasks %}
            <li>{{ task }}</li>
    {% endfor %}
</ul>

</body>
</html>
